<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Exporter</title>

  <!-- Tableau Extensions API — hosted locally in your repo alongside this file -->
  <!-- Download from: https://github.com/tableau/extensions-api/blob/main/lib/tableau.extensions.1.latest.js -->
  <script src="tableau.extensions.1.latest.js"></script>

  <!-- SheetJS for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 16px;
      font-size: 14px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #111;
    }

    #status {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 12px;
      color: #555;
      font-size: 13px;
    }
    #status.ok    { border-color: #4caf50; color: #2e7d32; background: #f1faf2; }
    #status.error { border-color: #f44336; color: #c62828; background: #fff5f5; }

    #ws-list {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
      display: none;
    }
    .ws-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .ws-row:last-child { border-bottom: none; }
    .ws-name { color: #333; }
    .ws-state { font-size: 11px; color: #999; }
    .ws-state.done { color: #4caf50; }
    .ws-state.err  { color: #f44336; }
    .ws-state.busy { color: #ff9800; }

    #progress-wrap {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-bottom: 12px;
      display: none;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #1976d2;
      border-radius: 2px;
      transition: width 0.25s ease;
    }

    #export-btn {
      width: 100%;
      padding: 11px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #export-btn:hover:not(:disabled) { background: #1565c0; }
    #export-btn:disabled { background: #bdbdbd; cursor: not-allowed; }

    #log {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      font-family: monospace;
      line-height: 1.8;
      display: none;
    }
    #log.show { display: block; }
    .log-ok  { color: #4caf50; }
    .log-err { color: #f44336; }
    .log-info{ color: #1976d2; }
  </style>
</head>
<body>

  <h2>📊 Dashboard Exporter</h2>

  <div id="status">Connecting to Tableau…</div>

  <div id="ws-list"></div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <button id="export-btn" disabled onclick="runExport()">Export to Excel</button>

  <div id="log"></div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────
let worksheets = [];
let dashboardName = '';

// ── DOM refs ───────────────────────────────────────────────────────────
const statusEl   = document.getElementById('status');
const wsList     = document.getElementById('ws-list');
const progressWrap = document.getElementById('progress-wrap');
const progressBar  = document.getElementById('progress-bar');
const exportBtn  = document.getElementById('export-btn');
const logEl      = document.getElementById('log');

// ── Helpers ────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  statusEl.textContent = msg;
  statusEl.className = type;
}

function setProgress(pct) {
  progressBar.style.width = pct + '%';
}

function log(msg, type = '') {
  logEl.classList.add('show');
  const line = document.createElement('div');
  if (type) line.className = 'log-' + type;
  line.textContent = '› ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  logEl.innerHTML = '';
  logEl.classList.remove('show');
}

function setState(wsIndex, state, label) {
  const row = document.getElementById('ws-row-' + wsIndex);
  if (!row) return;
  const stateEl = row.querySelector('.ws-state');
  stateEl.className = 'ws-state ' + state;
  stateEl.textContent = label;
}

// ── Init ───────────────────────────────────────────────────────────────
window.onload = function () {
  // Safety check — if SDK didn't load
  if (typeof tableau === 'undefined') {
    setStatus('ERROR: tableau.extensions SDK not found. Make sure tableau.extensions.1.latest.js is in the same folder as index.html.', 'error');
    return;
  }

  tableau.extensions.initializeAsync().then(function () {
    const dashboard = tableau.extensions.dashboardContent.dashboard;
    dashboardName   = dashboard.name;
    worksheets      = dashboard.worksheets;

    if (!worksheets || worksheets.length === 0) {
      setStatus('No worksheets found on this dashboard.', 'error');
      return;
    }

    setStatus('Ready · ' + dashboardName + ' · ' + worksheets.length + ' sheet(s)', 'ok');

    // Render worksheet list
    wsList.style.display = 'block';
    worksheets.forEach(function (ws, i) {
      const row = document.createElement('div');
      row.className = 'ws-row';
      row.id = 'ws-row-' + i;
      row.innerHTML = '<span class="ws-name">' + ws.name + '</span><span class="ws-state">waiting</span>';
      wsList.appendChild(row);
    });

    exportBtn.disabled = false;

  }, function (err) {
    setStatus('Init failed: ' + (err && err.message ? err.message : String(err)), 'error');
    log('Full error: ' + JSON.stringify(err), 'err');
    logEl.classList.add('show');
  });
};

// ── Export ─────────────────────────────────────────────────────────────
async function runExport() {
  exportBtn.disabled = true;
  exportBtn.textContent = 'Exporting…';
  clearLog();
  progressWrap.style.display = 'block';
  setProgress(0);

  const aoa       = [];   // all rows as array-of-arrays
  const styleMap  = [];   // parallel metadata for styling
  let totalRows   = 0;
  let maxCols     = 0;
  const COLORS    = ['4472C4','70AD47','ED7D31','A9D18E','FF0000','4BACC6','9DC3E6','FFC000'];

  // ── Meta header ───────────────────────────────────────────────────
  aoa.push(['Dashboard: ' + dashboardName]);   styleMap.push({ type: 'meta' });
  aoa.push(['Exported:  ' + new Date().toLocaleString()]); styleMap.push({ type: 'meta' });
  aoa.push([]); styleMap.push({ type: 'spacer' });

  const step = 90 / worksheets.length;

  // ── Loop worksheets ───────────────────────────────────────────────
  for (let i = 0; i < worksheets.length; i++) {
    const ws    = worksheets[i];
    const color = COLORS[i % COLORS.length];
    log('Fetching: ' + ws.name, 'info');
    setState(i, 'busy', 'fetching…');

    // Separator between sections (skip before first)
    if (i > 0) {
      aoa.push([]); styleMap.push({ type: 'spacer' });
      aoa.push([]); styleMap.push({ type: 'spacer' });
    }

    try {
      // ── Use modern paginated reader (deprecated getSummaryDataAsync replaced) ──
      const reader = await ws.getSummaryDataReaderAsync();
      const columns = reader.columns || [];
      const colCount = columns.length;
      if (colCount > maxCols) maxCols = colCount;

      // Section header row
      aoa.push([ws.name]);
      styleMap.push({ type: 'section', color, colCount });

      // Column header row
      aoa.push(columns.map(function (c) { return c.fieldName; }));
      styleMap.push({ type: 'colHeader', color, colCount });

      // Read all pages
      let wsRowCount = 0;
      try {
        for (let p = 0; p < reader.pageCount; p++) {
          const page = await reader.getPageAsync(p);
          for (const row of page.data) {
            aoa.push(row.map(function (cell) {
              if (cell.value === null || cell.value === undefined || cell.value === '%null%') return '';
              if (cell.nativeValue !== undefined && cell.nativeValue !== null) {
                return typeof cell.nativeValue === 'object' ? cell.value : cell.nativeValue;
              }
              return cell.value;
            }));
            styleMap.push({ type: 'data' });
            wsRowCount++;
          }
        }
      } finally {
        await reader.releaseAsync();
      }

      totalRows += wsRowCount;
      setState(i, 'done', wsRowCount.toLocaleString() + ' rows');
      log('✓ ' + ws.name + ' — ' + wsRowCount.toLocaleString() + ' rows, ' + colCount + ' cols', 'ok');

    } catch (wsErr) {
      setState(i, 'err', 'error');
      log('✗ ' + ws.name + ' — ' + wsErr.message, 'err');
      aoa.push([ws.name + ' — ERROR: ' + wsErr.message]);
      styleMap.push({ type: 'data' });
    }

    setProgress(Math.round((i + 1) * step));
  }

  // ── Build Excel worksheet ─────────────────────────────────────────
  log('Building Excel file (' + totalRows.toLocaleString() + ' total rows)…', 'info');
  setProgress(93);

  const xlSheet = XLSX.utils.aoa_to_sheet(aoa);

  // Apply styles
  styleMap.forEach(function (meta, r) {
    const colCount = meta.colCount || maxCols || 1;

    if (meta.type === 'section') {
      if (!xlSheet['!merges']) xlSheet['!merges'] = [];
      xlSheet['!merges'].push({ s: { r, c: 0 }, e: { r, c: Math.max(colCount - 1, 0) } });
      const addr = XLSX.utils.encode_cell({ r, c: 0 });
      if (!xlSheet[addr]) xlSheet[addr] = { t: 's', v: '' };
      xlSheet[addr].s = {
        font: { bold: true, sz: 11, color: { rgb: 'FFFFFF' } },
        fill: { patternType: 'solid', fgColor: { rgb: meta.color } },
        alignment: { horizontal: 'left', vertical: 'center', indent: 1 }
      };

    } else if (meta.type === 'colHeader') {
      for (let c = 0; c < colCount; c++) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (!xlSheet[addr]) xlSheet[addr] = { t: 's', v: '' };
        xlSheet[addr].s = {
          font: { bold: true, sz: 10 },
          fill: { patternType: 'solid', fgColor: { rgb: 'D9E1F2' } },
          border: { bottom: { style: 'thin', color: { rgb: meta.color } } },
          alignment: { horizontal: 'left' }
        };
      }

    } else if (meta.type === 'meta') {
      const addr = XLSX.utils.encode_cell({ r, c: 0 });
      if (xlSheet[addr]) xlSheet[addr].s = { font: { italic: true, color: { rgb: '888888' }, sz: 9 } };
    }
  });

  // Auto-fit column widths
  const widths = [];
  aoa.forEach(function (row) {
    row.forEach(function (cell, ci) {
      const len = String(cell ?? '').length;
      if (!widths[ci] || len > widths[ci]) widths[ci] = len;
    });
  });
  xlSheet['!cols'] = widths.map(function (w) { return { wch: Math.min((w || 8) + 2, 60) }; });

  // Row heights
  xlSheet['!rows'] = styleMap.map(function (m) {
    return { hpt: m.type === 'section' ? 20 : 15 };
  });

  // Write and download
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, xlSheet, 'Dashboard Data');

  setProgress(98);
  const filename = dashboardName.replace(/[^a-z0-9_\-]/gi, '_') + '_export.xlsx';
  XLSX.writeFile(wb, filename);

  setProgress(100);
  log('✓ Downloaded: ' + filename, 'ok');
  setStatus('Done · ' + totalRows.toLocaleString() + ' total rows exported', 'ok');

  exportBtn.disabled = false;
  exportBtn.textContent = 'Export to Excel';
}
</script>
</body>
</html>
