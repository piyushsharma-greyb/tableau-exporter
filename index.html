<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Exporter</title>

  <script src="tableau.extensions.1.latest.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      height: 100vh;
    }

    #export-btn {
      padding: 8px 20px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #export-btn:hover:not(:disabled) { background: #1565c0; }
    #export-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    #msg {
      margin-left: 10px;
      font-size: 12px;
      color: #555;
      display: none;
    }
    #msg.ok    { color: #2e7d32; display: inline; }
    #msg.error { color: #c62828; display: inline; }
    #msg.info  { color: #1565c0; display: inline; }
  </style>
</head>
<body>

  <button id="export-btn" disabled onclick="runExport()">Export to Excel</button>
  <span id="msg"></span>

<script>
'use strict';

let worksheets    = [];
let dashboardName = '';

const exportBtn = document.getElementById('export-btn');
const msgEl     = document.getElementById('msg');

function setMsg(text, type) {
  msgEl.className = type || '';
  msgEl.textContent = text;
  if (text) msgEl.style.display = 'inline'; else msgEl.style.display = 'none';
}

// ─── Header sheet detection (same logic as before) ──────────────────────────
const HEADER_MAP = {
  'header'       : ['Claim Type',      'Claim Type',      'Claim'],
  'packheader'   : ['Packaging Type',  'Packaging Type',  'Packaging'],
  'ingr header'  : ['Ingredient Type', 'Ingredient Type', 'Ingredient'],
  'dosage header': ['Dosage Type',     'Dosage Type',     'Dosage'],
};

function detectHeader(wsName) {
  const lo = wsName.toLowerCase().trim();
  if (HEADER_MAP[lo]) return HEADER_MAP[lo];
  for (const key of Object.keys(HEADER_MAP)) {
    if (lo.includes(key) || key.includes(lo)) return HEADER_MAP[key];
  }
  return null;
}

// ─── Skip non-data sheets (Reset 1/2/3, FS 1/2/3, etc.) ───────────────────
// Any sheet whose name starts with "Reset" or "FS" (case-insensitive) is skipped.
function shouldSkip(wsName) {
  const lo = wsName.toLowerCase().trim();
  return lo.startsWith('reset') || lo.startsWith('fs ') || lo === 'fs';
}

// ─── Init ──────────────────────────────────────────────────────────────────
window.onload = function () {
  if (typeof tableau === 'undefined') {
    setMsg('SDK not loaded', 'error');
    return;
  }
  tableau.extensions.initializeAsync().then(function () {
    const db      = tableau.extensions.dashboardContent.dashboard;
    dashboardName = db.name;
    worksheets    = db.worksheets;
    exportBtn.disabled = false;
  }, function (err) {
    setMsg('Init failed: ' + (err && err.message ? err.message : String(err)), 'error');
  });
};

// ─── Fetch all rows from a worksheet (paginated) ───────────────────────────
async function fetchAllRows(ws) {
  const reader = await ws.getSummaryDataReaderAsync();
  const allRows = [];
  try {
    for (let p = 0; p < reader.pageCount; p++) {
      const page = await reader.getPageAsync(p);
      for (const row of page.data) {
        allRows.push(row.map(function (cell) {
          if (cell.value === null || cell.value === undefined || cell.value === '%null%') return '';
          if (cell.nativeValue !== undefined && cell.nativeValue !== null) {
            return typeof cell.nativeValue === 'object' ? String(cell.value) : cell.nativeValue;
          }
          return cell.value;
        }));
      }
    }
  } finally {
    await reader.releaseAsync();
  }
  return allRows;
}

// ─── Export ────────────────────────────────────────────────────────────────
async function runExport() {
  exportBtn.disabled = true;
  exportBtn.textContent = 'Exporting…';
  setMsg('', '');

  try {
    // Group worksheets into sections
    const sections = [];
    let current = null;

    worksheets.forEach(function (ws) {
      if (shouldSkip(ws.name)) return; // skip Reset/FS sheets entirely

      const headerMeta = detectHeader(ws.name);
      if (headerMeta) {
        current = { meta: headerMeta, sheets: [] };
        sections.push(current);
      } else if (current) {
        current.sheets.push(ws);
      } else {
        current = { meta: ['Data', 'Type', 'Field'], sheets: [ws] };
        sections.push(current);
      }
    });

    const aoa      = [];
    const styleMap = [];

    const TITLE_COLORS = ['1F4E79', '375623', '7B2C2C', '3E3072'];
    const HDR_FILLS    = ['D6E4F0', 'E2EFDA', 'FCE4D6', 'EDE7F6'];

    for (let si = 0; si < sections.length; si++) {
      const section    = sections[si];
      const titleColor = TITLE_COLORS[si % TITLE_COLORS.length];
      const hdrFill    = HDR_FILLS[si % HDR_FILLS.length];
      const [tableTitle, col1Label, col2Label] = section.meta;

      if (aoa.length > 0) {
        aoa.push([]); styleMap.push({ type: 'spacer' });
        aoa.push([]); styleMap.push({ type: 'spacer' });
      }

      aoa.push([tableTitle]);
      styleMap.push({ type: 'title', color: titleColor, colCount: 4 });

      aoa.push(['Product Name', col1Label, col2Label, 'Values']);
      styleMap.push({ type: 'colHeader', fill: hdrFill, colCount: 4 });

      for (const ws of section.sheets) {
        const rows = await fetchAllRows(ws);
        for (const row of rows) {
          const product  = row[0] !== undefined ? row[0] : '';
          const subField = row[1] !== undefined ? row[1] : '';
          const value    = row[2] !== undefined ? row[2] : '';
          aoa.push([product, ws.name, subField, value]);
          styleMap.push({ type: 'data' });
        }
      }
    }

    // Build sheet
    const xlSheet = XLSX.utils.aoa_to_sheet(aoa);

    styleMap.forEach(function (meta, r) {
      const cols = meta.colCount || 4;
      function a(c) { return XLSX.utils.encode_cell({ r: r, c: c }); }

      if (meta.type === 'title') {
        if (!xlSheet['!merges']) xlSheet['!merges'] = [];
        xlSheet['!merges'].push({ s: { r: r, c: 0 }, e: { r: r, c: cols - 1 } });
        const cell = a(0);
        if (!xlSheet[cell]) xlSheet[cell] = { t: 's', v: '' };
        xlSheet[cell].s = {
          font: { bold: true, sz: 12, color: { rgb: 'FFFFFF' } },
          fill: { patternType: 'solid', fgColor: { rgb: meta.color } },
          alignment: { horizontal: 'left', vertical: 'center', indent: 1 }
        };
      } else if (meta.type === 'colHeader') {
        for (let c = 0; c < cols; c++) {
          const cell = a(c);
          if (!xlSheet[cell]) xlSheet[cell] = { t: 's', v: '' };
          xlSheet[cell].s = {
            font: { bold: true, sz: 10 },
            fill: { patternType: 'solid', fgColor: { rgb: meta.fill } },
            alignment: { horizontal: 'left' },
            border: { bottom: { style: 'thin', color: { rgb: '888888' } } }
          };
        }
      } else if (meta.type === 'data') {
        for (let c = 0; c < 4; c++) {
          const cell = a(c);
          if (xlSheet[cell]) {
            xlSheet[cell].s = {
              font: { sz: 10 },
              alignment: { wrapText: true, vertical: 'top' }
            };
          }
        }
      }
    });

    xlSheet['!cols'] = [{ wch: 32 }, { wch: 16 }, { wch: 28 }, { wch: 65 }];
    xlSheet['!rows'] = styleMap.map(function (m) {
      return { hpt: m.type === 'title' ? 22 : m.type === 'colHeader' ? 18 : 15 };
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, xlSheet, 'Dashboard Data');

    // Clean filename — strip special chars, append .xlsx explicitly
    const safeName = dashboardName.replace(/[^a-z0-9_\-]/gi, '_');
    XLSX.writeFile(wb, safeName + '.xlsx', { bookType: 'xlsx' });

    setMsg('Exported!', 'ok');

  } catch (err) {
    setMsg('Error: ' + err.message, 'error');
  }

  exportBtn.disabled = false;
  exportBtn.textContent = 'Export to Excel';
}
</script>
</body>
</html>
