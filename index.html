<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Exporter</title>

  <script src="tableau.extensions.1.latest.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      height: 100vh;
    }

    #export-btn {
      padding: 8px 20px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #export-btn:hover:not(:disabled) { background: #1565c0; }
    #export-btn:disabled { background: #90a4ae; cursor: not-allowed; }

    #msg {
      margin-left: 10px;
      font-size: 12px;
      color: #555;
      display: none;
    }
    #msg.ok    { color: #2e7d32; display: inline; }
    #msg.error { color: #c62828; display: inline; }

    /* ── Overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #overlay.show { display: flex; }

    /* ── Modal ── */
    #modal {
      background: #fff;
      border-radius: 8px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .modal-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e0e0e0;
    }
    .modal-header h3 { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 3px; }
    .modal-header p  { font-size: 11px; color: #777; }

    /* Type rows */
    #type-list { padding: 8px 0; }

    .type-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .type-item:hover { background: #f5f8ff; }

    .type-item input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #1976d2;
      cursor: pointer;
      flex-shrink: 0;
    }

    .type-label {
      flex: 1;
    }
    .type-label strong {
      display: block;
      font-size: 13px;
      color: #222;
      font-weight: 600;
    }
    .type-label span {
      font-size: 11px;
      color: #888;
    }

    .modal-footer {
      padding: 10px 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .btn-cancel {
      padding: 7px 16px;
      background: #fff;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-confirm {
      padding: 7px 16px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-confirm:hover { background: #1565c0; }
    .btn-confirm:disabled { background: #90a4ae; cursor: not-allowed; }
  </style>
</head>
<body>

  <button id="export-btn" disabled onclick="openModal()">Export to Excel</button>
  <span id="msg"></span>

  <!-- Type selection modal -->
  <div id="overlay">
    <div id="modal">
      <div class="modal-header">
        <h3>Select Product Types</h3>
        <p>Choose which numbered types to include across all sections.</p>
      </div>

      <div id="type-list">
        <!-- populated by JS once worksheets are known -->
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" id="confirm-btn" onclick="confirmExport()" disabled>Export</button>
      </div>
    </div>
  </div>

<script>
'use strict';

let worksheets    = [];
let dashboardName = '';
let availableNums = []; // e.g. [1, 2, 3] — discovered from actual worksheet names

const exportBtn  = document.getElementById('export-btn');
const msgEl      = document.getElementById('msg');
const overlay    = document.getElementById('overlay');
const typeList   = document.getElementById('type-list');
const confirmBtn = document.getElementById('confirm-btn');

function setMsg(text, type) {
  msgEl.className = type || '';
  msgEl.textContent = text;
  msgEl.style.display = text ? 'inline' : 'none';
}

// ─── Header / skip detection ───────────────────────────────────────────────
const HEADER_MAP = {
  'header'       : ['Claim Type',      'Claim Type',      'Claim'],
  'packheader'   : ['Packaging Type',  'Packaging Type',  'Packaging'],
  'ingr header'  : ['Ingredient Type', 'Ingredient Type', 'Ingredient'],
  'dosage header': ['Dosage Type',     'Dosage Type',     'Dosage'],
};

function detectHeader(wsName) {
  const lo = wsName.toLowerCase().trim();
  if (HEADER_MAP[lo]) return HEADER_MAP[lo];
  for (const key of Object.keys(HEADER_MAP)) {
    if (lo.includes(key) || key.includes(lo)) return HEADER_MAP[key];
  }
  return null;
}

function shouldSkip(wsName) {
  const lo = wsName.toLowerCase().trim();
  return lo.startsWith('reset') || lo.startsWith('fs ') || lo === 'fs';
}

// ─── Extract trailing number from a worksheet name ─────────────────────────
// "Claims 1" → 1,  "Ingr. 2" → 2,  "Packaging 3" → 3,  "Header" → null
function trailingNum(wsName) {
  const m = wsName.trim().match(/(\d+)\s*$/);
  return m ? parseInt(m[1], 10) : null;
}

// ─── Init ──────────────────────────────────────────────────────────────────
window.onload = function () {
  if (typeof tableau === 'undefined') {
    setMsg('SDK not loaded', 'error');
    return;
  }
  tableau.extensions.initializeAsync().then(function () {
    const db      = tableau.extensions.dashboardContent.dashboard;
    dashboardName = db.name;
    worksheets    = db.worksheets;

    // Discover all unique trailing numbers from data worksheets
    const numSet = new Set();
    worksheets.forEach(function (ws) {
      if (shouldSkip(ws.name) || detectHeader(ws.name)) return;
      const n = trailingNum(ws.name);
      if (n !== null) numSet.add(n);
    });
    availableNums = Array.from(numSet).sort(function (a, b) { return a - b; });

    exportBtn.disabled = false;

  }, function (err) {
    setMsg('Init failed: ' + (err && err.message ? err.message : String(err)), 'error');
  });
};

// ─── Fetch all rows (paginated) ────────────────────────────────────────────
async function fetchAllRows(ws) {
  const reader  = await ws.getSummaryDataReaderAsync();
  const allRows = [];
  try {
    for (let p = 0; p < reader.pageCount; p++) {
      const page = await reader.getPageAsync(p);
      for (const row of page.data) {
        allRows.push(row.map(function (cell) {
          if (cell.value === null || cell.value === undefined || cell.value === '%null%') return '';
          if (cell.nativeValue !== undefined && cell.nativeValue !== null) {
            return typeof cell.nativeValue === 'object' ? String(cell.value) : cell.nativeValue;
          }
          return cell.value;
        }));
      }
    }
  } finally {
    await reader.releaseAsync();
  }
  return allRows;
}

// ─── Modal ─────────────────────────────────────────────────────────────────
// Friendly labels for each number slot
const TYPE_LABELS = {
  1: 'Product Type 1',
  2: 'Product Type 2',
  3: 'Product Type 3',
};

// Sub-sheet names shown as hint, built dynamically from actual ws names
function sheetsForNum(n) {
  return worksheets
    .filter(function (ws) { return !shouldSkip(ws.name) && !detectHeader(ws.name) && trailingNum(ws.name) === n; })
    .map(function (ws) { return ws.name; })
    .join(', ');
}

function openModal() {
  // If no numbered types found, skip modal and export everything
  if (availableNums.length === 0) {
    runExport(null);
    return;
  }

  typeList.innerHTML = '';

  availableNums.forEach(function (n) {
    const item = document.createElement('div');
    item.className = 'type-item';

    const chk = document.createElement('input');
    chk.type    = 'checkbox';
    chk.id      = 'chk-type-' + n;
    chk.value   = n;
    chk.checked = true;
    chk.addEventListener('change', updateConfirmState);

    const lbl = document.createElement('div');
    lbl.className = 'type-label';
    lbl.innerHTML =
      '<strong>' + (TYPE_LABELS[n] || 'Type ' + n) + '</strong>' +
      '<span>' + sheetsForNum(n) + '</span>';

    // Click anywhere on row toggles checkbox
    item.addEventListener('click', function (e) {
      if (e.target !== chk) { chk.checked = !chk.checked; updateConfirmState(); }
    });

    item.appendChild(chk);
    item.appendChild(lbl);
    typeList.appendChild(item);
  });

  updateConfirmState();
  overlay.classList.add('show');
}

function closeModal() {
  overlay.classList.remove('show');
}

function updateConfirmState() {
  const any = typeList.querySelectorAll('input[type="checkbox"]:checked').length > 0;
  confirmBtn.disabled = !any;
}

function confirmExport() {
  const checked = Array.from(typeList.querySelectorAll('input[type="checkbox"]:checked'))
                       .map(function (chk) { return parseInt(chk.value, 10); });
  closeModal();
  // If all numbers are selected, pass null (no filter = include all)
  const filter = checked.length === availableNums.length ? null : new Set(checked);
  runExport(filter);
}

// ─── Export ────────────────────────────────────────────────────────────────
async function runExport(numFilter) {
  // numFilter: Set of numbers to include (e.g. Set{1,2}), or null = all
  exportBtn.disabled = true;
  exportBtn.textContent = 'Exporting…';
  setMsg('', '');

  try {
    // Group worksheets into sections
    const sections = [];
    let current = null;
    worksheets.forEach(function (ws) {
      if (shouldSkip(ws.name)) return;
      const headerMeta = detectHeader(ws.name);
      if (headerMeta) {
        current = { meta: headerMeta, sheets: [] };
        sections.push(current);
      } else if (current) {
        // Only include this sheet if its trailing number is in the filter
        const n = trailingNum(ws.name);
        if (numFilter === null || numFilter.has(n)) {
          current.sheets.push(ws);
        }
      } else {
        const n = trailingNum(ws.name);
        if (numFilter === null || numFilter.has(n)) {
          current = { meta: ['Data', 'Type', 'Field'], sheets: [ws] };
          sections.push(current);
        }
      }
    });

    // Remove empty sections (all sheets filtered out)
    const activeSections = sections.filter(function (s) { return s.sheets.length > 0; });

    const aoa      = [];
    const styleMap = [];
    const TITLE_COLORS = ['1F4E79', '375623', '7B2C2C', '3E3072'];
    const HDR_FILLS    = ['D6E4F0', 'E2EFDA', 'FCE4D6', 'EDE7F6'];

    for (let si = 0; si < activeSections.length; si++) {
      const section    = activeSections[si];
      const titleColor = TITLE_COLORS[si % TITLE_COLORS.length];
      const hdrFill    = HDR_FILLS[si % HDR_FILLS.length];
      const [tableTitle, col1Label, col2Label] = section.meta;

      if (aoa.length > 0) {
        aoa.push([]); styleMap.push({ type: 'spacer' });
        aoa.push([]); styleMap.push({ type: 'spacer' });
      }

      aoa.push([tableTitle]);
      styleMap.push({ type: 'title', color: titleColor, colCount: 4 });

      aoa.push(['Product Name', col1Label, col2Label, 'Values']);
      styleMap.push({ type: 'colHeader', fill: hdrFill, colCount: 4 });

      for (const ws of section.sheets) {
        const rows = await fetchAllRows(ws);
        for (const row of rows) {
          const product  = row[0] !== undefined ? row[0] : '';
          const subField = row[1] !== undefined ? row[1] : '';
          const value    = row[2] !== undefined ? row[2] : '';
          aoa.push([product, ws.name, subField, value]);
          styleMap.push({ type: 'data' });
        }
      }
    }

    // Build sheet
    const xlSheet = XLSX.utils.aoa_to_sheet(aoa);

    styleMap.forEach(function (meta, r) {
      const cols = meta.colCount || 4;
      function a(c) { return XLSX.utils.encode_cell({ r: r, c: c }); }

      if (meta.type === 'title') {
        if (!xlSheet['!merges']) xlSheet['!merges'] = [];
        xlSheet['!merges'].push({ s: { r: r, c: 0 }, e: { r: r, c: cols - 1 } });
        const cell = a(0);
        if (!xlSheet[cell]) xlSheet[cell] = { t: 's', v: '' };
        xlSheet[cell].s = {
          font: { bold: true, sz: 12, color: { rgb: 'FFFFFF' } },
          fill: { patternType: 'solid', fgColor: { rgb: meta.color } },
          alignment: { horizontal: 'left', vertical: 'center', indent: 1 }
        };
      } else if (meta.type === 'colHeader') {
        for (let c = 0; c < cols; c++) {
          const cell = a(c);
          if (!xlSheet[cell]) xlSheet[cell] = { t: 's', v: '' };
          xlSheet[cell].s = {
            font: { bold: true, sz: 10 },
            fill: { patternType: 'solid', fgColor: { rgb: meta.fill } },
            alignment: { horizontal: 'left' },
            border: { bottom: { style: 'thin', color: { rgb: '888888' } } }
          };
        }
      } else if (meta.type === 'data') {
        for (let c = 0; c < 4; c++) {
          const cell = a(c);
          if (xlSheet[cell]) {
            xlSheet[cell].s = {
              font: { sz: 10 },
              alignment: { wrapText: true, vertical: 'top' }
            };
          }
        }
      }
    });

    xlSheet['!cols'] = [{ wch: 32 }, { wch: 16 }, { wch: 28 }, { wch: 65 }];
    xlSheet['!rows'] = styleMap.map(function (m) {
      return { hpt: m.type === 'title' ? 22 : m.type === 'colHeader' ? 18 : 15 };
    });

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, xlSheet, 'Dashboard Data');

    const safeName   = dashboardName.replace(/[^a-z0-9_\-]/gi, '_');
    const filterNote = numFilter ? '_type' + Array.from(numFilter).sort().join('_') : '';
    XLSX.writeFile(wb, safeName + filterNote + '.xlsx', { bookType: 'xlsx' });

    const label = numFilter
      ? 'Exported · Type ' + Array.from(numFilter).sort().join(', ')
      : 'Exported · All types';
    setMsg(label, 'ok');

  } catch (err) {
    setMsg('Error: ' + err.message, 'error');
  }

  exportBtn.disabled = false;
  exportBtn.textContent = 'Export to Excel';
}
</script>
</body>
</html>
